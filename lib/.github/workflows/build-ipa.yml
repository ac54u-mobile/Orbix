name: Build Orbix IPA

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  build-ios:
    runs-on: macos-latest # 必须使用 Mac 环境

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # 核心：编译 iOS 产物，跳过苹果的强制签名审查
      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      # 将编译出的 .app 封装为 .ipa
      - name: Package Unsigned IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Orbix.app
          cd build/ios/iphoneos
          zip -r Orbix.ipa Payload

      # 上传生成的 .ipa 文件供你下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Orbix-Unsigned-IPA
          path: build/ios/iphoneos/Orbix.ipa
          retention-days: 7